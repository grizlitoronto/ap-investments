<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="400" viewBox="0 0 1600 400" fill="none">
  <rect width="1600" height="400" fill="#F8F5EF"/>

  <!-- Bigger Monogram -->
  <g transform="translate(60,60)">
    <rect x="0.5" y="0.5" width="220" height="220" rx="28" fill="#FFFFFF" stroke="#DCD1B8" stroke-width="1.5"/>
    <text x="110" y="155" text-anchor="middle"
      font-family="Georgia, serif"
      font-size="120"
      font-weight="700"
      letter-spacing="6"
      fill="#0F172A">APG</text>
  </g>

  <!-- Larger Wordmark -->
  <g transform="translate(340,140)">
    <text x="0" y="60"
      font-family="Georgia, serif"
      font-size="64"
      font-weight="600"
      letter-spacing="1"
      fill="#0F172A">
      A.P.G Investments Ltd.
    </text>

    <text x="2" y="110"
      font-family="Arial, Helvetica, sans-serif"
      font-size="20"
      font-weight="600"
      letter-spacing="8"
      fill="#8B6F3D">
      PRIVATE INVESTMENT FIRM
    </text>
  </g>
</svg>
